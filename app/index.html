    <!-- Social preview. Static + site-wide: this is an SPA, so link scrapers (which
         don't run JS) only ever see index.html — and spaFallback copies it to
         404.html, so shared deep links get the same card. og:image is an app-owned
         asset served from the site root (no content coupling, no raw URL). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Likhan Siddiquee" />
    <meta property="og:title" content="Likhan Siddiquee" />
    <meta property="og:description" content="Likhan Siddiquee — writing, notes, and projects." />
    <meta property="og:url" content="https://www.likhansiddiquee.com/" />
    <meta property="og:image" content="https://www.likhansiddiquee.com/og.jpg" />
    <meta property="og:image:width" content="1600" />
    <meta property="og:image:height" content="900" />
    <meta property="og:image:alt" content="Likhan Siddiquee" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Likhan Siddiquee" />
    <meta name="twitter:description" content="Likhan Siddiquee — writing, notes, and projects." />
    <meta name="twitter:image" content="https://www.likhansiddiquee.com/og.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Cloudflare Web Analytics (privacy-first, no cookies, no consent banner). Token is a public beacon id. -->
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "2c887362dca64e45b98a1cbed0f99dd6"}'
    ></script>
  </body>
</html>
